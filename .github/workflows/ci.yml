name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: ansible-galaxy version
        run: ansible-galaxy --version

      - name: Test to build Ansible collection
        run: ansible-galaxy collection build --force --ignore-certs

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [3.87.2, 3.89.1, 3.90.1]
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Ensure all shell script having the executable flag
        run: chmod +x *.sh
        working-directory: ./samples

      - name: Setup Ansible for testing
        run: ./setup_ansible.sh
        working-directory: ./samples

      - name: Setup Nexus 3
        run: ./setup_nexus.sh
        working-directory: ./samples
        env:
          NEXUS_HOST: localhost
          IMAGE_TAG: ${{ matrix.version }}

      - name: Run samples
        run: ./run_samples.sh
        working-directory: ./samples
        env:
          NEXUS_HOST: localhost

      - name: Teardown Nexus 3
        if: always()
        run: ./teardown_nexus.sh
        working-directory: ./samples
        env:
          NEXUS_HOST: localhost
